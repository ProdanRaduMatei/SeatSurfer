spring:
  application:
    name: seatsurfer
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:seatsurfer;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  error:
    include-message: always

app:
  auth:
    jwt-secret: ${APP_JWT_SECRET:change-me-before-production-change-me-before-production}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:480}
    otp-expiration-minutes: ${APP_OTP_EXPIRATION_MINUTES:10}
    expose-dev-otp: ${APP_EXPOSE_DEV_OTP:true}
  cors:
    allowed-origins:
      - ${APP_CORS_ORIGIN_1:http://localhost:4173}
      - ${APP_CORS_ORIGIN_2:http://127.0.0.1:4173}
      - ${APP_CORS_ORIGIN_3:http://localhost:5500}
      - ${APP_CORS_ORIGIN_4:http://127.0.0.1:5500}
      - ${APP_CORS_ORIGIN_5:http://localhost:8081}
      - ${APP_CORS_ORIGIN_6:http://127.0.0.1:8081}
  reporting:
    email-enabled: ${APP_REPORTING_EMAIL_ENABLED:false}
    monthly-cron: ${APP_REPORTING_MONTHLY_CRON:0 0 8 1 * *}
    recipients: ${APP_REPORTING_RECIPIENTS:}
